<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student signup</title>
    <style>
        h1 {
            text-decoration: underline;
            color: gray;
            text-align: center;
            font-size: 35px;
        }

        #Main_contenner {
            border: black 1px solid;
        }

        #Main_subcontenner_1 {
            border: black 1px solid;
            height: 50px;
            background-color: aliceblue;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 40px;
            color: green;
        }

        #Main_subcontenner_2 {
            padding-left: 40%;
        }

        h2 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 40px;
            text-decoration: underline;

        }

        #signup_button {
            background-color: rgb(223, 240, 255);
            border-radius: 5px;
            width: 200px;
            height: 50px;
            font-size: 35px;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        #Main_subcontenner_3 {
            gap: 20px;

            text-decoration: dotted;
        }
    </style>
</head>
<h1>Welcome to Student Signup</h1>

<body>
    <div id="Main_contenner">
        <div id="Main_subcontenner_1">Plantation Mission</div>
        <div id="Main_subcontenner_2">
            <form>
                <h2> Student Registration</h2>
                <label for="name">Name of Student : </label>
                <input type="text" id="name" placeholder="Name of Student" required><br><br>
                <label for="roll_Number"> Enrollment Number :</label>
                <input type="text" id="roll_Number" placeholder="Enrollment Number" required><br><br>
                <label for="email">Email id : </label>
                <input type="email" id="email" placeholder="Email id " required><br><br>
                <label for="phone">Mobile Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter mobile number" pattern="[0-9]{10}"
                    required><br><br>
                <label for="Dep">Departement:</label>
                <select id="Dep" name="city">
                    <option value="" selected disabled>Department :</option>
                    <option value="CSE">B.tech CSE</option>
                    <option value="Min">B.tech Mining</option>
                    <option value="medical">Paramedical Scince</option>
                    <option value="chennai">Legal Studies/Law</option>
                </select><br><br>
                <label for="pass">Password : </label>
                <input type="text" id="pass" placeholder="Create New Password " required><br><br>
                <label for="c_pass">Confirm Password :</label>
                <input type="text" id="c_pass" placeholder="Confirm Password "><br><br>

                <button id="signup_button">Signup</button><br><br>
            </form>
            <div id="Main_subcontenner_3">
                <P style="display:inline;">You have account ? </P>
                <a href="s_Login.html" style="display:inline;">Login</a>
            </div>
        </div>
    </div>
</body>

</html>
