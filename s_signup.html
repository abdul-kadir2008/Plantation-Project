<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Signup - Plantation Mission</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #2ecc71, #27ae60);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            width: 420px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #27ae60;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #27ae60;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .login-link a {
            text-decoration: none;
            color: #27ae60;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Student Signup</h2>

        <form>

            <div class="input-group">
                <label>Student Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Enrollment Number</label>
                <input type="text" placeholder="Enter enrollment number" required>
            </div>

            <div class="input-group">
                <label>Email ID</label>
                <input type="email" placeholder="Enter email" required>
            </div>

            <div class="input-group">
                <label>Department</label>
                <select required>
                    <option value="" disabled selected>Select Department</option>
                    <option>CSE</option>
                    <option>Mechanical</option>
                    <option>Electrical</option>
                    <option>Civil</option>
                    <option>Mining</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="input-group">
                <label>Section</label>
                <input type="text" placeholder="Enter section">
            </div>

            <div class="input-group">
                <label>Semester</label>
                <select required>
                    <option value="" selected disabled>Select Semester</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                </select>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password" required>
            </div>

            <button type="submit">Create Account</button>

        </form>

        <div class="login-link">
            Already have account? <a href="s_Login.html">Login</a>
        </div>

    </div>

</body>

</html>
