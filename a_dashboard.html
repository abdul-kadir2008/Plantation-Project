<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard - Plantation Mission</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f1f8f4;
        }

        /* Header */
        .header {
            background: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            height: 100vh;
            background: #1b5e20;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
            margin: 5px;
        }

        .sidebar a:hover {
            background: #2e7d32;
            border-radius: 5px;
        }

        /* Main Content */
        .main {
            margin-left: 210px;
            padding: 20px;
        }

        .card {
            display: inline-block;
            width: 200px;
            padding: 20px;
            margin: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 5px gray;
            text-align: center;
        }

        .card h3 {
            margin: 10px 0;
            color: #2e7d32;
        }

        .btn {
            padding: 8px 15px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #1b5e20;
        }
    </style>
</head>

<body>

    <div class="header">
        Welcome to Admin dashboard 🌱
    </div>

    <div class="sidebar">
        <a href="#">Dashboard</a>
        <a href="a_Student_Recoard.html">Student Records</a>
        <a href="a_Approve_Plantation.html">Approve Plantation</a>
        <a href="a_reeport.html">Reports</a>
        <a href="a_Login.html">Logout</a>
    </div>

    <div class="main">
        <h2>Welcome Admin 👨‍💼</h2>

        <div class="card">
            <h3>Total Students</h3>
            <p>120</p>
        </div>

        <div class="card">
            <h3>Plantations Done</h3>
            <p>350</p>
        </div>

        <div class="card">
            <h3>Pending Requests</h3>
            <p>25</p>
        </div>

        <br><br>

        <button class="btn">View Details</button>
    </div>

</body>

</html>
