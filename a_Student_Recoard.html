<!DOCTYPE html>
<html>

<head>
    <title>Student Records - Admin</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f1f8f4;
        }

        .header {
            background: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            padding: 20px;
        }

        h2 {
            color: #2e7d32;
        }

        /* Search & Filter */
        .controls {
            margin-bottom: 15px;
        }

        input[type="text"],
        select {
            padding: 8px;
            margin-right: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .search-btn {
            padding: 8px 15px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .search-btn:hover {
            background: #1b5e20;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 0px 5px gray;
        }

        table,
        th,
        td {
            border: 1px solid #ccc;
        }

        th {
            background: #2e7d32;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .btn-approve {
            background: green;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
        }

        .btn-reject {
            background: red;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
        }

        .Back {
            text-align: center;

            background: green;

            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            width: 120px;
            cursor: pointer;

        }
    </style>
</head>

<body>

    <div class="header">
        Student Records - Plantation Mission 🌱
    </div>

    <div class="container">
        <h2>All Student Plantation Records</h2>

        <!-- Search & Filter -->
        <div class="controls">
            <input type="text" placeholder="Search by Name or Enrollment">

            <select>
                <option>Filter by Status</option>
                <option>Approved</option>
                <option>Pending</option>
                <option>Rejected</option>
            </select>

            <select>
                <option>Filter by Department</option>
                <option>Computer Science</option>
                <option>Biology</option>
                <option>Commerce</option>
            </select>

            <button class="search-btn">Search</button>
        </div>

        <!-- Table -->
        <table>
            <tr>
                <th>Student Name</th>
                <th>Enrollment No</th>
                <th>Department</th>
                <th>Plant Name</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            <tr>
                <td>Ali Khan</td>
                <td>12345</td>
                <td>Computer Science</td>
                <td>Neem</td>
                <td>20-03-2026</td>
                <td>Pending</td>
                <td>
                    <button class="btn-approve">Approve</button>
                    <button class="btn-reject">Reject</button>
                </td>
            </tr>

            <tr>
                <td>Sara Ahmed</td>
                <td>67890</td>
                <td>Biology</td>
                <td>Mango</td>
                <td>18-03-2026</td>
                <td>Approved</td>
                <td>
                    <button class="btn-approve">Approve</button>
                    <button class="btn-reject">Reject</button>
                </td>
            </tr>

        </table>
    </div>
    <div class="Back">
        <a href="a_dashboard.html"> Back To DeshBoard</a>
    </div>

</body>

</html>
